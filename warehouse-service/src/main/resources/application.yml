server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/portdb?options=-c%20TimeZone=Asia/Ho_Chi_Minh}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    ignore-migration-patterns: "*:Missing"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:29092}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}
    topic:
      yard-events: ${APP_KAFKA_TOPIC_YARD_EVENTS:yard-events}

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:8001}
    enabled: ${ML_SERVICE_ENABLED:true}
    connect-timeout-ms: ${ML_SERVICE_CONNECT_TIMEOUT_MS:300}
    read-timeout-ms: ${ML_SERVICE_READ_TIMEOUT_MS:800}

jwt:
  secret: ${JWT_SECRET:change-me-secret-change-me-secret}
  issuer: ${JWT_ISSUER:anhnht-backend}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:36000}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

